<html>
<head>
    <title>PERSONAJES DE PROGRAMACION</title>
    <style>
        *{
            padding: 0px;
            margin: opx;
        }
    .contenedor{
        width: 600px;
        height: 300px;
        border: 1px solid black;
        margin: 0 auto;
        position: relative;
        overflow: hidden;
    }
    .tarjeta1, .tarjeta2, .tarjeta3{
        width: 200px;
        height: 300px;
        position: absolute;
        top: -300px;
        background-size: cover;
    }
    .tarjeta1{
        background-image: url(img2/bgny9\ \(1\).jpg);
        left: 0px;
        animation: tarjeta1 3s 1 forwards;

    }
     .tarjeta2{
        background-image: url(img2/dRTUu.jpg);
        background-size: cover;
        left: 200px;
        animation: tarjeta2 3s 1 forwards 3s;
    }
     .tarjeta3{
        background-image: url(img2/gnmaD\ \(1\).jpg);
        background-size: cover;
        left: 400px;
        animation: tarjeta3 3s forwards 6s;
    }
/*ANIMACIONES*/
@keyframes tarjeta1{
    0%{
        top: -300px;
        transform: rotateY(180deg);
        left: -600px;
    }
    50%{
        top: 150px;
        left: 300px;
    }
    100%{
        top: 0px;
    }

}
@keyframes tarjeta2{
    0%{
        top: 300px;
        transform: rotateY(180deg);
    }
    50%{
        top: -300px;
    }
    100%{
        top: 0px;
    }

}
@keyframes tarjeta3{
    0%{
        top: 300px;
        transform: rotateY(180deg);
        left: 600px;
    }
    50%{
        top: 150px;
        left: 300px;
    }
    100%{
        top: 0px;
    }

}
.tarjeta1:hover{
    transition: 1s ;
    scale: 1.2;
    z-index: 1;
}
.tarjeta2:hover{
    transition: 1s ;
    scale: 1.2;
    z-index: 1;
}
.tarjeta3:hover{
    transition: 1s ;
    scale: 1.2;
    z-index: 1;
}


    </style>
</head>
<body>
    <div class="contenedor">
        <div class="tarjeta1"></div>
        <div class="tarjeta2"></div>
        <div class="tarjeta3"></div>


    </div>
</body>
</html>
